name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PROJECT_NAME: "obxx"
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Windows Latest MSVC",
            artifact_ext: '.zip',
            os: windows-latest,
            cc: "cl",
            cxx: "cl",
            environment_script: "C:/Program Files (x86)/Microsoft Visual Studio/2019/Enterprise/VC/Auxiliary/Build/vcvars64.bat",
          }
        - {
            name: "Ubuntu Latest GCC",
            artifact_ext: '.tar.gz',
            os: ubuntu-latest,
            cc: "gcc",
            cxx: "g++",
          }
        - {
            name: "macOS Latest Clang",
            artifact_ext: '.tar.gz',
            os: macos-latest,
            cc: "clang",
            cxx: "clang++",
          }

    steps:
    - name: Set version name (Windows)
      id: version_win
      if: ${{ runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $TAG = (${env:GITHUB_REF} -replace 'refs/tags/', '')
        echo "name=$TAG" >> ${env:GITHUB_OUTPUT}
    
    - name: Set version name
      id: version
      if: ${{ runner.os != 'Windows' }}
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "name=$TAG" >> "$GITHUB_OUTPUT"

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache dependencies
      uses: actions/cache@v4
      id: cache
      with:
        path: ${{ github.HOME }}/.local
        key: ${{ runner.os }}-dependencies-${{ hashFiles('CMakeLists.txt') }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build python3-pip

    - name: Build
      run: |
        ./scripts/ci_setup.sh

    - name: Run tests
      working-directory: build/${ env.BUILD_TYPE }
      run: |
        ctest --output-on-failure

    # for a release not directly containing the source code, replace the files archived
    # with the actual files needed (i.e. *.lib/*.a and *.h(pp))

    - name: Generate archive (Windows)
      if: ${{ runner.os == 'Windows' }}
      run: |
        rmdir -r -fo build
        7z a -tzip $HOME/artifact.zip *

    - name: Generate archive
      if: ${{ runner.os != 'Windows' }}
      run: |
        rm -rf build
        tar -cvzf $HOME/artifact.tar.gz .

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: ${{ runner.os == 'Windows' }}
      with:
        name: ${{ runner.os }}-${{ steps.version_win.outputs.name }}
        path: '~/artifact.*'

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: ${{ runner.os != 'Windows' }}
      with:
        name: ${{ runner.os }}-${{ steps.version.outputs.name }}
        path: '~/artifact.*'

